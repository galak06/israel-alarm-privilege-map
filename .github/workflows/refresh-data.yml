name: Refresh Alert Data (Daily)

on:
  schedule:
    - cron: '0 5 * * *'   # 5:00 UTC = 7:00 AM Israel time every day
  workflow_dispatch:       # allow manual trigger

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # needed to commit updated cache back to repo

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch fresh alert data
        run: node scripts/fetch-localities.mjs
        env:
          REDALERT_API_KEY: ${{ secrets.REDALERT_API_KEY }}

      - name: Commit updated cache and localities
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add scripts/alerts-cache.json public/localities.json
          git diff --staged --quiet || git commit -m "chore: refresh alert data [skip ci]"
          git push

      - name: Build
        run: npm run build

      - name: Deploy via FTP
        run: node scripts/deploy-ftp.mjs
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_REMOTE_PATH: ${{ secrets.FTP_REMOTE_PATH }}
          REDALERT_API_KEY: ${{ secrets.REDALERT_API_KEY }}
